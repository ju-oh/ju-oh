@font-face{

body,p,h1,h2,h3,h4,h5,h6,ul,ol,li,dl,dt,dd,table,th,td,form,fieldset,legend,input,

/*바탕화면의 4개의 그림에 대한 CSS text는 inline으로 설정해서 div로 나눳을때 한줄이 다차지 않게함*/
.text{
	width: 400px;
	height: 400px;
	display: inline-block;
}
#text1{
	background-image: url("극단적.png");
	background-size:100% 100%;

#text3{

#text4{
	margin-left:25%;

}
/*좌측 메뉴바에 대한 CSS */
/*메뉴바 버튼*/
.btn1 {
  width: 100px;
  height: 100px;
  position: absolute;
  left: 0px;
  top: 0px;
  z-index: 1;
  background-image: url("http://s1.daumcdn.net/cfs.tistory/custom/blog/204/2048858/skin/images/menu.png");
  background-size: 50%;
  background-repeat: no-repeat;
  background-position: center;
  cursor: pointer;
}
/*닫기버튼*/
.close {
margin-left:33%;
  width: 50px;
  height: 50px;
  position: absolute;
  left: 0px;
  top: 0px;
  background-image: url("http://s1.daumcdn.net/cfs.tistory/custom/blog/204/2048858/skin/images/close.png");
  background-size: 50%;
  background-repeat: no-repeat;
  background-position: center;
  cursor: pointer;
}
/*메뉴의 틀
 transition 은 마우스 오버시 자바스크립트나 플래시 없이 div에 어떠한 액션을 줄때 사용하는 CSS.*/
#menu {
  width: 150px;
  height: 100%;
  position: fixed;
  top: 0px;
  left: -152px;
  z-index: 10;
  border: 1px solid #c9c9c9;
  background-color: white;
  text-align: center;
  transition: All 0.2s ease;
  -webkit-transition: All 0.2s ease;
  -moz-transition: All 0.2s ease;
  -o-transition: All 0.2s ease;
}

#menu.open {
  left: 0px;
}

.page_cover.open {
  display: block;
}

.page_cover {
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0px;
  left: 0px;
  background-color: rgba(0, 0, 0, 0.4);
  z-index: 4;
  display: none;
}
/*하트에 관한 CSS cursor는 포인터*/
.heart {
  width: 100px;
  height: 100px;
  display: inline-block;
  transform: translate(-50%, -50%);
  background: url(https://cssanimation.rocks/images/posts/steps/heart.png) no-repeat;
  background-position: 0 0;
  cursor: pointer;
  animation: fave-heart 1s steps(28);
}
.heart:hover {
  background-position: -2800px 0;
  transition: background 1s steps(28);
  
}
#heart1{
	margin-left:200px;
	margin-top:40px;
}
#heart2{
	margin-left:600px;
}
#heart3{
	margin-top:40px;
	margin-left:200px;
}
#heart4{
	margin-left:600px;
}
@keyframes fave-heart {
  0% {
    background-position: 0 0;
  }
  100% {
    background-position: -2800px 0;
  }
}

</style>

<script>
//메뉴바 누를시 자바스크립트
$(".btn1").click(function() { 
  $("#menu,.page_cover,html").addClass("open");
  window.location.hash = "#open";
});

window.onhashchange = function() {
  if (location.hash != "#open") {
    $("#menu,.page_cover,html").removeClass("open");
  }
};
