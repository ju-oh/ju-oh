<script type="text/javascript">
var ctx;
var cwidth=400; var cheight=180;
var firstPick=true;
var firstCard, secondCard;
var frontBgColor="rgb(251,215,73)"; //카드 글꼴 배경색
var polyColor="rgb(254,11,0)"; //다각형 색상
var backColor="rgb(34,53,69)"; //카드 뒷면 색상
var tableColor="#669999"; //보드 색상
var cardRad=15; //다각형 반경
var deck=[]; //패 저장용 배열
var firstSx=30, firstSy=20; //첫 카드 위치
var margin=8; //카드 간격
var cardWidth=4*cardRad; //카드 너비를 다각형 반경의 4배로.
var cardHeight=4*cardRad;
var matched;
var startTime;
var cardAvailable=true; //정지기간 중 카드 선택 못하게 하기위한 변수

function Card(sx,sy,swidth,sheight,info){
   this.sx=sx; this.sy=sy;
   this.swidth=swidth;
   this.sheight=sheight;
   this.info=info;
   this.draw=drawBack;
}

function makeDeck(){ //카드 덱 만들기
   var aCard, bCard;
   var cx=firstSx, cy=firstSy;
   for(var i=3; i < 8; i++){ //삼각형에서 7각형까지 만들기
      aCard=new Card(cx,cy,cardWidth,cardHeight,i);
      deck.push(aCard);
      //aCard의 아랫쪽에 생성
      bCard=new Card(cx,cy+cardHeight+margin,cardWidth,cardHeight,i);
      deck.push(bCard);
      cx=cx+cardWidth+margin;//카드 너비, 마진을 감안해 증가
      aCard.draw(); //캔버스에 카드 그리기
      bCard.draw();
   }
   shuffle(); //카드 섞기 함수 호출
}

function shuffle(){ //카드 섞기
   var i, k;
   var holder;
   var dl=deck.length; //배열 길이 저장 변수
   var nt; //패의 카드 수 저장 변수
   for (nt=0; nt < 3*dl; nt++){ //카드 덱 길이의 3배 실행
      i=Math.floor(Math.random()*dl);
      k=Math.floor(Math.random()*dl);
      holder = deck[i].info;
      deck[i].info = deck[k].info;
      deck[k].info = holder;
   }
}

function PolyCard(sx,sy,rad,n){ //다각형 생성함수
   this.sx=sx, this.sy=sy;
   this.rad=rad;
   this.draw=drawPoly;
   this.n=n; //변의 수
   this.angle=(2*Math.PI)/n; //다각형에 따락 각도 결정
}

function drawPoly(){
   ctx.fillStyle=frontBgColor;
   //사각형의 모서리가 다각형 중심의 왼쪽 위에 있음
   ctx.fillRect(this.sx-2*this.rad, this.sy-2*this.rad,4*this.rad,4*this.rad);
   ctx.beginPath();
   ctx.fillStyle=polyColor;
   var rad=this.rad;
   //다각형의 첫번째 점으로 이동.
   ctx.moveTo(this.sx+rad*Math.cos(-0.5*this.angle),this.sy+rad*Math.sin(-0.5*this.angle));
   for(var i=1; i < this.n; i++){
      //다각형 선 그리기
      ctx.lineTo(this.sx+rad*Math.cos((i-0.5)*this.angle),this.sy+rad*Math.sin((i-0.5)*this.angle));
   }
   ctx.fill(); //패스 채우기
}

function drawBack(){
   ctx.fillStyle=backColor;
   ctx.fillRect(this.sx,this.sy,this.swidth,this.sheight);
}

function choose(ev){ //마우스로 카드 선택시 처리 함수
   var mx, my; //마우스 x,y 저장 변수
   var pick1, pick2; //다각형 객체참조 저장용
   if(ev.layerX || ev.layerX==0){
      mx=ev.layerX;
      my=ev.layerY;
   }else if(ev.offsetX || ev.offsetX==0){
      mx=ev.offsetX;
      my=ev.offsetY;
   }
   for(var i=0; i < deck.length; i++){ //카드덱 전체 순회
      var card=deck[i];
      if(card.sx >= 0) //제거된 카드인지 검사
      if(cardAvailable) //카드 선택이 가능한지 검사
         //마우스가 카드위에 있는지 검사
      if((mx>card.sx)&&(mx<card.sx+card.swidth)&&(my>card.sy)&&(my<card.sy+card.sheight)){
         //첫번째 고른 카드이거나 처음 누른 것과 같은 카드가 아니면
         if((firstPick) || (i!=firstCard)) break;
      }
   }
   if(i < deck.length){
      if(firstPick){ //첫번째 고른 카드일 경우
         firstCard = i;
         firstPick = false;
         pick1=new PolyCard(card.sx+cardWidth*0.5,card.sy+cardHeight*0.5,cardRad,card.info);
         pick1.draw();
      }else{ //두번째 고른 카드일 경우
         secondCard = i;
         pick2=new PolyCard(card.sx+cardWidth*0.5,card.sy+cardHeight*0.5,cardRad,card.info);
         pick2.draw();
         if(deck[i].info==deck[firstCard].info){ //같은 카드이면
            matched=true;
            //일치횟수 증가시키고 form에 표시하기
            var nm=1+Number(document.f.count.value);
            document.f.count.value=String(nm);
            if(nm >= 0.5*deck.length){ //카드를 모두 맞췄을 경우
               setTimeout(finish,1500); //1.5초뒤에 엔딩처리 함수 호출
            }
         }else{ //같은 카드가 아닐경우
            matched=false;
         }
         firstPick=true;
         cardAvailable=false; //정지중 카드 선택 못하게 하기
         setTimeout(flipBack, 1000); //잠시 정지
      }
   }
}

function finish(){ //엔딩 처리
   var now=new Date();
   var nt=Number(now.getTime());
   var seconds=Math.floor(0.5+(nt-startTime)/1000);
   document.f.elapsed.value=String(seconds);

   ctx.fillStyle=tableColor;
   ctx.fillRect(0,0,cwidth,cheight);

   ctx.fillStyle="white";
   ctx.font="bold 30px Accent";
   ctx.fillText("All Clear!",50,70);
   ctx.font="bold 20px sans-serif";
   ctx.fillText("Clear Time is "+seconds+" seconds",50,130);
}

function flipBack(){
   if(!matched){ //카드가 일치되지 않았을 경우
      deck[firstCard].draw();
      deck[secondCard].draw();
   }else{//카드가 일치할 경우
      ctx.fillStyle=tableColor;
      //일치한 카드 배경색의 사각형으로 덮어 안보이게 하기
      ctx.fillRect(deck[secondCard].sx,deck[secondCard].sy,deck[secondCard].swidth,deck[secondCard].sheight);
      ctx.fillRect(deck[firstCard].sx,deck[firstCard].sy,deck[firstCard].swidth,deck[firstCard].sheight);
      //일치한 카드 선택 못하도록 설정
      deck[secondCard].sx= -1;
      deck[firstCard].sx= -1;
   }
   cardAvailable=true;
}

function init(){
   ctx=document.getElementById('canvas').getContext('2d');
   canvas1=document.getElementById('canvas');
   canvas1.addEventListener('click',choose,false);
   ctx.fillStyle=tableColor;
   ctx.fillRect(0,0,cwidth,cheight);
   makeDeck();
   document.f.count.value="0";
   document.f.elapsed.value="";
   startTime=new Date();
   startTime=Number(startTime.getTime());
   shuffle();
}

function restart(){
   init();
}
</script>
